<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A lightweight task dashboard sample project." />
    <meta name="theme-color" content="#f4f1e9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FocusBoard" />
    <title>FocusBoard — Make today count</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="#" aria-label="FocusBoard home">
          <span class="brand-mark">F</span>
          <span>FocusBoard</span>
        </a>
        <button class="icon-button" id="theme-toggle" aria-label="Toggle color theme" title="Toggle theme">☾</button>
      </header>

      <main>
        <section class="hero">
          <div>
            <p class="eyebrow" id="date-label"></p>
            <h1>Make today <em>count.</em></h1>
            <p class="subtitle">A quiet place for the work that matters.</p>
          </div>
          <div class="progress-card" aria-label="Daily progress">
            <div class="progress-ring" id="progress-ring"><span id="progress-value">0%</span></div>
            <div><strong id="progress-title">Fresh start</strong><span id="progress-copy">Add your first task</span></div>
          </div>
        </section>

        <section class="composer" aria-label="Add a new task">
          <form id="task-form">
            <span class="plus">+</span>
            <input id="task-input" maxlength="100" autocomplete="off" placeholder="What needs your attention?" aria-label="New task" required />
            <select id="priority-input" aria-label="Priority">
              <option value="normal">Normal</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
            <button type="submit">Add task</button>
          </form>
        </section>

        <section class="workspace">
          <div class="section-head">
            <div class="tabs" role="tablist" aria-label="Task filters">
              <button class="tab active" data-filter="all">All <span id="all-count">0</span></button>
              <button class="tab" data-filter="active">Active</button>
              <button class="tab" data-filter="done">Done</button>
            </div>
            <button class="clear-button" id="clear-done">Clear completed</button>
          </div>
          <ul id="task-list" class="task-list" aria-live="polite"></ul>
          <div class="empty-state" id="empty-state">
            <div class="empty-icon">✓</div>
            <h2>Room to think</h2>
            <p>Add a task above and give your day some direction.</p>
          </div>
        </section>
      </main>

      <footer><span>Focus on less. Finish more.</span><span id="remaining-label">0 tasks remaining</span></footer>
    </div>
    <script src="app.js"></script>
  </body>
</html>
